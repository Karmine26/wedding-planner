<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#8a6d3b">
<title>Amin & Co — Wedding Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- desktop sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="ring">💍</span>
        <div><b>Amin &amp; Co</b><small>Palmer House · 7.10.27</small></div>
      </div>
      <nav class="nav" id="navDesktop"></nav>
    </aside>

    <div class="main">
      <!-- mobile top bar -->
      <div class="topbar">
        <span class="ring">💍</span>
        <b id="topTitle">Dashboard</b>
      </div>
      <div id="view"></div>
    </div>
  </div>

  <!-- mobile bottom nav -->
  <nav class="bottomnav" id="navMobile"></nav>

  <!-- floating add button -->
  <button class="fab" id="fab" title="Add">+</button>

  <!-- modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Supabase client (used only if config.js provides credentials) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="seed.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>

  <!-- PWA: register the service worker (installable + offline) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
